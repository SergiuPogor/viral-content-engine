<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: {{width}}px;
    height: {{height}}px;
    overflow: hidden;
  }
  body {
    background: {{background}};
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px;
    position: relative;
    font-family: '{{font}}', system-ui, -apple-system, sans-serif;
  }
  .title {
    text-align: center;
    font-size: 20px;
    color: {{handle_color}};
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 40px;
    font-weight: 600;
  }
  .columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    width: 100%;
  }
  .col-header {
    font-size: 28px;
    font-weight: 800;
    padding: 20px 30px;
    text-align: center;
    letter-spacing: -0.01em;
  }
  .col-header.left {
    color: {{accent_color}};
    border-right: 2px solid {{accent_color}}22;
  }
  .col-header.right {
    color: {{text_color}};
  }
  .row {
    display: contents;
  }
  .cell {
    padding: 18px 30px;
    font-size: 22px;
    color: {{text_color}};
    line-height: 1.4;
  }
  .cell.left {
    border-right: 2px solid {{accent_color}}22;
    color: {{handle_color}};
    text-align: right;
  }
  .cell.right {
    font-weight: 700;
    text-align: left;
  }
  .vs-badge {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: {{accent_color}};
    color: {{background}};
    width: 48px;
    height: 48px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 16px;
    z-index: 10;
  }
  .handle {
    position: absolute;
    bottom: 30px;
    right: 40px;
    font-size: 14px;
    color: {{handle_color}};
  }
</style>
</head>
<body>
  <div class="title">{{content}}</div>
  <div class="columns">
    <div class="col-header left">{{left_label}}</div>
    <div class="col-header right">{{right_label}}</div>
    {{#each rows}}
    <div class="cell left">{{this.[0]}}</div>
    <div class="cell right">{{this.[1]}}</div>
    {{/each}}
  </div>
  <div class="vs-badge">VS</div>
  <div class="handle">{{handle}}</div>
</body>
</html>
