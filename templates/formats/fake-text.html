<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: {{width}}px;
    height: {{height}}px;
    overflow: hidden;
  }
  body {
    background: {{background}};
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 60px;
    font-family: '{{font}}', system-ui, -apple-system, sans-serif;
    position: relative;
  }
  .phone-frame {
    background: {{background}};
    border: 2px solid {{handle_color}}33;
    border-radius: 40px;
    padding: 40px 30px;
    width: 85%;
    max-width: 600px;
  }
  .status-bar {
    text-align: center;
    color: {{handle_color}};
    font-size: 14px;
    margin-bottom: 20px;
    padding-bottom: 15px;
    border-bottom: 1px solid {{handle_color}}22;
  }
  .contact-name {
    text-align: center;
    font-size: 20px;
    font-weight: 700;
    color: {{text_color}};
    margin-bottom: 30px;
  }
  .messages {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .message {
    max-width: 75%;
    padding: 16px 20px;
    border-radius: 20px;
    font-size: 20px;
    line-height: 1.4;
  }
  .message.them {
    align-self: flex-start;
    background: {{handle_color}}22;
    color: {{text_color}};
    border-bottom-left-radius: 4px;
  }
  .message.me {
    align-self: flex-end;
    background: {{accent_color}};
    color: white;
    border-bottom-right-radius: 4px;
  }
  .handle-text {
    position: absolute;
    bottom: 30px;
    font-size: 14px;
    color: {{handle_color}};
  }
</style>
</head>
<body>
  <div class="phone-frame">
    <div class="status-bar">iMessage</div>
    <div class="contact-name">Messages</div>
    <div class="messages">
      {{#each messages}}
      <div class="message {{this.sender}}">{{this.text}}</div>
      {{/each}}
    </div>
  </div>
  <div class="handle-text">{{handle}}</div>
</body>
</html>
