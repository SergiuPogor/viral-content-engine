<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: {{width}}px; height: {{height}}px; overflow: hidden; }

  body {
    display: flex;
    flex-direction: column;
    height: 100vh;
    font-family: -apple-system, 'SF Pro', system-ui, sans-serif;
    position: relative;
    overflow: hidden;
    background: #000000;
  }

  /* iOS status bar */
  .status-bar {
    flex: 0 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 50px;
    background: #1c1c1e;
    z-index: 3;
  }
  .status-time {
    font-size: 22px;
    font-weight: 600;
    color: #fff;
  }
  .status-icons {
    display: flex;
    gap: 8px;
    font-size: 18px;
    color: #fff;
  }

  /* Nav bar with contact name */
  .nav-bar {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    padding: 20px 40px;
    background: #1c1c1e;
    border-bottom: 1px solid #2c2c2e;
    gap: 20px;
    z-index: 3;
  }
  .nav-back {
    font-size: 42px;
    color: #0a84ff;
    font-weight: 300;
  }
  .nav-avatar {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: linear-gradient(135deg, #5856d6, #af52de);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    color: #fff;
    font-weight: 700;
    flex-shrink: 0;
  }
  .nav-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .nav-name {
    font-size: 24px;
    font-weight: 600;
    color: #fff;
  }
  .nav-status {
    font-size: 16px;
    color: #8e8e93;
  }

  /* Messages area fills remaining space */
  .messages-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 30px 40px;
    gap: 16px;
    background: #000000;
    overflow: hidden;
    z-index: 2;
  }

  /* iMessage date header */
  .date-header {
    text-align: center;
    font-size: 16px;
    color: #8e8e93;
    padding: 10px 0;
  }

  .message {
    max-width: 78%;
    padding: 22px 28px;
    border-radius: 24px;
    font-size: 38px;
    line-height: 1.35;
    word-break: break-word;
  }
  .message.them {
    align-self: flex-start;
    background: #2c2c2e;
    color: #ffffff;
    border-bottom-left-radius: 6px;
  }
  .message.me {
    align-self: flex-end;
    background: #0a84ff;
    color: #ffffff;
    border-bottom-right-radius: 6px;
  }

  /* Delivery status */
  .delivered {
    align-self: flex-end;
    font-size: 15px;
    color: #8e8e93;
    padding-right: 8px;
  }

  /* Input bar at bottom */
  .input-bar {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px 40px 50px;
    background: #1c1c1e;
    border-top: 1px solid #2c2c2e;
    z-index: 3;
  }
  .input-plus {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: #2c2c2e;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 38px;
    color: #8e8e93;
    flex-shrink: 0;
  }
  .input-field {
    flex: 1;
    height: 52px;
    border-radius: 26px;
    border: 1px solid #3a3a3c;
    background: transparent;
    padding: 0 24px;
    font-size: 22px;
    color: #8e8e93;
    display: flex;
    align-items: center;
  }
  .input-send {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: #0a84ff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    color: #fff;
    flex-shrink: 0;
  }

  /* Branding */
  .branding {
    position: absolute;
    bottom: 12px;
    right: 50px;
    font-size: 16px;
    color: #3a3a3c;
    z-index: 4;
  }
</style>
</head>
<body>
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <span class="status-icons">📶 📡 🔋</span>
  </div>

  <div class="nav-bar">
    <span class="nav-back">‹</span>
    <div class="nav-avatar">💬</div>
    <div class="nav-info">
      <span class="nav-name">Messages</span>
      <span class="nav-status">iMessage</span>
    </div>
  </div>

  <div class="messages-area">
    <div class="date-header">Today 9:38 PM</div>
    {{#each messages}}
    <div class="message {{this.sender}}">{{this.text}}</div>
    {{/each}}
    <span class="delivered">Delivered</span>
  </div>

  <div class="input-bar">
    <div class="input-plus">+</div>
    <div class="input-field">iMessage</div>
    <div class="input-send">↑</div>
  </div>

  <div class="branding">{{handle}}</div>
</body>
</html>
