<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: {{width}}px; height: {{height}}px; overflow: hidden; }

  body {
    background: #0f0f0f;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 80px;
    position: relative;
    font-family: system-ui, -apple-system, sans-serif;
  }

  /* Subtle background glow */
  .glow {
    position: absolute;
    width: 800px; height: 400px;
    background: radial-gradient(ellipse, #10b98115 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
  }

  /* List label */
  .label {
    position: absolute;
    top: 60px;
    left: 80px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .label-icon { font-size: 30px; }
  .label-text {
    font-size: 22px;
    font-weight: 700;
    color: #10b981;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* Title */
  .title {
    font-size: 48px;
    font-weight: 900;
    color: #ffffff;
    text-align: left;
    width: 100%;
    margin-bottom: 50px;
    letter-spacing: -0.03em;
    line-height: 1.1;
    position: relative;
    z-index: 2;
  }
  .title span {
    color: #10b981;
  }

  /* Items */
  .items {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 24px;
    position: relative;
    z-index: 2;
  }

  .item {
    display: flex;
    align-items: flex-start;
    gap: 24px;
  }

  .item-num {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: linear-gradient(135deg, #10b98133, #06b6d433);
    border: 1px solid #10b98144;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 800;
    color: #10b981;
    flex-shrink: 0;
  }

  .item-text {
    font-size: {{font_size}};
    color: #d1fae5;
    line-height: 1.35;
    font-weight: 600;
    padding-top: 8px;
  }

  /* Bottom bar */
  .bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 5px;
    background: linear-gradient(90deg, #10b981, #06b6d4, #8b5cf6);
  }

  .handle {
    position: absolute;
    bottom: 30px;
    right: 80px;
    font-size: 20px;
    color: #ffffff22;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="bottom"></div>

  <div class="label">
    <span class="label-icon">📋</span>
    <span class="label-text">List</span>
  </div>

  <div class="title">{{title}}</div>

  <div class="items">
    {{#each items}}
    <div class="item">
      <div class="item-num">{{add @index 1}}</div>
      <div class="item-text">{{this}}</div>
    </div>
    {{/each}}
  </div>

  <div class="handle">{{handle}}</div>
</body>
</html>
