<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: {{width}}px; height: {{height}}px; overflow: hidden; }

  body {
    display: flex;
    flex-direction: column;
    height: 100vh;
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    position: relative;
    background: #020c0a;
    overflow: hidden;
  }

  /* Subtle background texture */
  .bg-glow {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 40% at 50% 0%, #05966915 0%, transparent 60%);
  }
  .bg-glow2 {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 40% at 80% 100%, #0891b210 0%, transparent 60%);
  }

  /* Header fills top ~28% */
  .header {
    flex: 0 0 28%;
    background: linear-gradient(135deg, #059669, #0891b2);
    padding: 70px 80px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 20px;
  }
  .header::after {
    content: "";
    position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 50px;
    background: #020c0a;
    clip-path: polygon(0 100%, 100% 0, 100% 100%);
  }
  .header-label {
    font-size: 24px;
    font-weight: 700;
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .header-title {
    font-size: 60px;
    font-weight: 900;
    color: #fff;
    line-height: 1.1;
    letter-spacing: -0.03em;
    max-width: 85%;
  }
  .header-num {
    position: absolute;
    right: 40px; bottom: 10px;
    font-size: 220px;
    font-weight: 900;
    color: rgba(255,255,255,0.08);
    line-height: 1;
  }

  /* Items fill remaining ~62% */
  .items {
    flex: 1;
    display: flex;
    flex-direction: column;
    z-index: 2;
  }

  .item {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 30px;
    padding: 0 80px;
    border-bottom: 1px solid #0a1f18;
  }
  .item:last-child { border-bottom: none; }

  .item-num {
    width: 64px; height: 64px;
    border-radius: 16px;
    background: linear-gradient(135deg, #05966922, #0891b222);
    border: 1px solid #059669;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: 900;
    color: #10b981;
    flex-shrink: 0;
  }

  .item-text {
    font-size: {{font_size}};
    color: #a7f3d0;
    line-height: 1.3;
    font-weight: 600;
  }

  /* Footer ~10% */
  .footer {
    flex: 0 0 auto;
    padding: 40px 80px;
    border-top: 1px solid #0a1f18;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 2;
  }
  .footer-cta { font-size: 28px; color: #10b981; font-weight: 600; }
  .handle { font-size: 24px; color: #1f4d35; }
</style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="bg-glow2"></div>

  <div class="header">
    <div class="header-label">📋 The List</div>
    <div class="header-title">{{title}}</div>
    <div class="header-num">{{items.length}}</div>
  </div>

  <div class="items">
    {{#each items}}
    <div class="item">
      <div class="item-num">{{add @index 1}}</div>
      <div class="item-text">{{this}}</div>
    </div>
    {{/each}}
  </div>

  <div class="footer">
    <span class="footer-cta">Save for later 📌</span>
    <span class="handle">{{handle}}</span>
  </div>
</body>
</html>
