<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: {{width}}px; height: {{height}}px; overflow: hidden; }

  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 80px 70px;
    position: relative;
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  }

  /* Dramatic gradient orbs */
  .orb1 {
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, #7c3aed33 0%, transparent 70%);
    top: -100px; left: -150px;
    border-radius: 50%;
  }
  .orb2 {
    position: absolute;
    width: 500px; height: 500px;
    background: radial-gradient(circle, #ec489933 0%, transparent 70%);
    bottom: -80px; right: -100px;
    border-radius: 50%;
  }

  /* Top label */
  .label {
    position: absolute;
    top: 70px;
    left: 70px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .label-dot {
    width: 10px; height: 10px;
    background: #a78bfa;
    border-radius: 50%;
  }
  .label-text {
    font-size: 22px;
    font-weight: 600;
    color: #a78bfa;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* Main quote marks */
  .quote-open {
    position: absolute;
    top: 120px;
    left: 60px;
    font-size: 160px;
    color: #7c3aed22;
    font-family: Georgia, serif;
    line-height: 1;
    font-weight: 900;
    user-select: none;
  }

  /* Content */
  .content {
    font-size: {{font_size}};
    color: #ffffff;
    text-align: center;
    line-height: 1.25;
    font-weight: 800;
    letter-spacing: -0.03em;
    max-width: 92%;
    position: relative;
    z-index: 2;
  }

  /* Highlighted word effect — last word gets gradient */
  .content em {
    font-style: normal;
    background: linear-gradient(135deg, #a78bfa, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* Bottom bar */
  .bottom {
    position: absolute;
    bottom: 0;
    left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, #7c3aed, #ec4899, #f59e0b);
  }

  /* Handle */
  .handle {
    position: absolute;
    bottom: 50px;
    right: 70px;
    font-size: 22px;
    color: #ffffff44;
    font-weight: 500;
    letter-spacing: 0.05em;
  }

  /* Corner decoration */
  .corner-br {
    position: absolute;
    bottom: 70px;
    left: 70px;
    width: 40px; height: 40px;
    border-bottom: 3px solid #7c3aed44;
    border-left: 3px solid #7c3aed44;
  }
  .corner-tr {
    position: absolute;
    top: 70px;
    right: 70px;
    width: 40px; height: 40px;
    border-top: 3px solid #ec489944;
    border-right: 3px solid #ec489944;
  }
</style>
</head>
<body>
  <div class="orb1"></div>
  <div class="orb2"></div>
  <div class="bottom"></div>

  <div class="label">
    <div class="label-dot"></div>
    <span class="label-text">Relatable</span>
  </div>

  <div class="quote-open">"</div>
  <div class="corner-tr"></div>
  <div class="corner-br"></div>

  <div class="content">{{content}}</div>

  <div class="handle">{{handle}}</div>
</body>
</html>
