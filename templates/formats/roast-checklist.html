<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: {{width}}px; height: {{height}}px; overflow: hidden; }

  body {
    display: flex;
    flex-direction: column;
    height: 100vh;
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    position: relative;
    background: #0a0000;
    overflow: hidden;
  }

  /* Red glow fills background */
  .glow-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 600px;
    background: radial-gradient(ellipse 80% 100% at 50% 0%, #7f1d1d18 0%, transparent 100%);
  }
  .glow-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 400px;
    background: radial-gradient(ellipse 80% 100% at 50% 100%, #7f1d1d10 0%, transparent 100%);
  }

  /* Hazard stripe */
  .hazard {
    height: 22px;
    background: repeating-linear-gradient(-45deg, #dc2626 0px, #dc2626 25px, #1a0000 25px, #1a0000 50px);
    flex-shrink: 0;
  }

  /* Title block ~20% */
  .title-block {
    flex: 0 0 auto;
    padding: 50px 80px 40px;
    z-index: 2;
  }
  .title-label {
    font-size: 26px;
    font-weight: 700;
    color: #dc2626;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .title-text {
    font-size: 58px;
    font-weight: 900;
    color: #fff;
    line-height: 1.1;
    letter-spacing: -0.03em;
  }

  /* Items fill remaining space */
  .items {
    flex: 1;
    display: flex;
    flex-direction: column;
    z-index: 2;
  }

  .item {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 30px;
    padding: 0 80px;
    border-bottom: 1px solid #1a0505;
  }
  .item:last-child { border-bottom: none; }

  .checkbox {
    width: 56px; height: 56px;
    border: 3px solid #dc262666;
    border-radius: 12px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    font-weight: 900;
    color: #dc2626;
    background: rgba(220, 38, 38, 0.06);
  }
  .item:nth-child(odd) .checkbox::after { content: "✓"; }
  .item:nth-child(even) .checkbox { border-color: #33000066; background: transparent; }

  .item-text {
    font-size: {{font_size}};
    color: #fecaca;
    line-height: 1.3;
    font-weight: 600;
  }

  /* Last item highlighted */
  .item:last-child {
    background: rgba(220, 38, 38, 0.08);
  }
  .item:last-child .item-text {
    color: #fff;
    font-style: italic;
  }
  .item:last-child .checkbox {
    border-color: #dc2626;
    background: rgba(220, 38, 38, 0.15);
  }
  .item:last-child .checkbox::after { content: "✓"; }

  /* Footer */
  .footer {
    flex: 0 0 auto;
    padding: 35px 80px;
    border-top: 1px solid #1a0505;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 2;
  }
  .footer-cta { font-size: 28px; color: #ef4444; font-weight: 600; }
  .handle { font-size: 24px; color: #3f0000; }
</style>
</head>
<body>
  <div class="glow-top"></div>
  <div class="glow-bottom"></div>

  <div class="hazard"></div>

  <div class="title-block">
    <div class="title-label">☠️ Roast Checklist</div>
    <div class="title-text">{{title}}</div>
  </div>

  <div class="items">
    {{#each items}}
    <div class="item">
      <div class="checkbox"></div>
      <div class="item-text">{{this}}</div>
    </div>
    {{/each}}
  </div>

  <div class="hazard"></div>

  <div class="footer">
    <span class="footer-cta">How many apply to you? 💀</span>
    <span class="handle">{{handle}}</span>
  </div>
</body>
</html>
