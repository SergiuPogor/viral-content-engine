<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: {{width}}px; height: {{height}}px; overflow: hidden; }

  body {
    background: #0d0d0d;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 100px 80px;
    position: relative;
    font-family: system-ui, -apple-system, sans-serif;
  }

  /* Red glow top-right */
  .glow {
    position: absolute;
    top: -80px; right: -80px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, #dc262633 0%, transparent 70%);
    border-radius: 50%;
  }

  /* Danger tape top */
  .tape {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 10px;
    background: repeating-linear-gradient(
      -45deg,
      #dc2626,
      #dc2626 20px,
      #1a1a1a 20px,
      #1a1a1a 40px
    );
    opacity: 0.8;
  }

  /* Title */
  .title {
    font-size: 44px;
    font-weight: 900;
    color: #dc2626;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: 50px;
    position: relative;
    z-index: 2;
    text-transform: uppercase;
  }

  /* Checklist */
  .items {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 28px;
    position: relative;
    z-index: 2;
  }

  .item {
    display: flex;
    align-items: flex-start;
    gap: 24px;
  }

  .checkbox {
    width: 36px; height: 36px;
    border: 2px solid #dc262666;
    border-radius: 6px;
    flex-shrink: 0;
    margin-top: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #dc2626;
    font-size: 24px;
    font-weight: 900;
  }
  /* Alternate checked/unchecked */
  .item:nth-child(odd) .checkbox::after { content: "✓"; }

  .item-text {
    font-size: {{font_size}};
    color: #e5e7eb;
    line-height: 1.3;
    font-weight: 600;
  }

  /* Last item is most painful */
  .item:last-child .item-text {
    color: #fca5a5;
    font-style: italic;
  }

  /* Bottom */
  .tape-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 10px;
    background: repeating-linear-gradient(
      -45deg,
      #dc2626,
      #dc2626 20px,
      #1a1a1a 20px,
      #1a1a1a 40px
    );
    opacity: 0.8;
  }

  .handle {
    position: absolute;
    bottom: 30px;
    right: 80px;
    font-size: 20px;
    color: #ffffff22;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="tape"></div>
  <div class="tape-bottom"></div>

  <div class="title">{{title}}</div>

  <div class="items">
    {{#each items}}
    <div class="item">
      <div class="checkbox"></div>
      <div class="item-text">{{this}}</div>
    </div>
    {{/each}}
  </div>

  <div class="handle">{{handle}}</div>
</body>
</html>
